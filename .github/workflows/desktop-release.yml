name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Desktop Bundles (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
          - name: Linux
            runner: ubuntu-22.04
          - name: Windows
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Build Tauri bundles
        run: |
          cd frontend
          npm run desktop:build

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform.name }}
          if-no-files-found: error
          path: |
            frontend/src-tauri/target/release/bundle/**/*.dmg
            frontend/src-tauri/target/release/bundle/**/*.app.tar.gz
            frontend/src-tauri/target/release/bundle/**/*.app.tar.gz.sig
            frontend/src-tauri/target/release/bundle/**/*.AppImage
            frontend/src-tauri/target/release/bundle/**/*.AppImage.tar.gz
            frontend/src-tauri/target/release/bundle/**/*.AppImage.tar.gz.sig
            frontend/src-tauri/target/release/bundle/**/*.deb
            frontend/src-tauri/target/release/bundle/**/*.rpm
            frontend/src-tauri/target/release/bundle/**/*.msi
            frontend/src-tauri/target/release/bundle/**/*.msi.zip
            frontend/src-tauri/target/release/bundle/**/*.msi.zip.sig
            frontend/src-tauri/target/release/bundle/**/*.nsis.zip
            frontend/src-tauri/target/release/bundle/**/*.nsis.zip.sig
            frontend/src-tauri/target/release/bundle/**/*.exe

  publish:
    name: Publish Desktop Release
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: desktop-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Claudex Desktop ${{ github.ref_name }}
          body: Desktop release for ${{ github.ref_name }}.
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            desktop-artifacts/**/*
